name: i18n-quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  i18n:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check locale parity
        run: npm run i18n:check

      - name: Run i18n audit
        run: npm run i18n:audit
